<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>SEZGİN KUYUMCULUK</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: linear-gradient(to bottom, #fefefe, #f3e9dc);
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 3rem auto;
            background: #fff;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        header h1 {
            font-size: 2.5rem;
            color: #c89e50;
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
            font-weight: 700;
        }

        h2 {
            font-size: 1.8rem;
            text-align: center;
            color: #555;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        th {
            background-color: #fafafa;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 1.1rem;
            color: #444;
            padding: 16px;
        }

        td {
            background: #fff;
            padding: 20px;
            text-align: center;
            border: 1px solid #eee;
            border-radius: 6px;
            font-size: 2.1rem;
            font-weight: 700;
        }

        tr {
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.03);
        }

        tr:hover td {
            background: #fef6e4;
            transition: background 0.3s ease;
        }

        #guncellemeZamani {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.95rem;
            color: #777;
        }

        @media (max-width: 600px) {

            table,
            thead,
            tbody,
            th,
            td,
            tr {
                display: block;
            }

            tr {
                margin-bottom: 1rem;
            }

            td {
                text-align: right;
                padding-left: 50%;
                position: relative;
            }

            td::before {
                content: attr(data-label);
                position: absolute;
                left: 0;
                width: 50%;
                padding-left: 1rem;
                font-weight: bold;
                text-align: left;
                color: #999;
                font-size: 1.3rem;
            }

            th {
                display: none;
            }
        }

        .fark-ok {
            font-size: 2rem;
            animation: fadeOut 10s forwards;
        }

        .green-ok {
            color: green;
        }

        .red-ok {
            color: red;
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div id="bildirimKutusu" style="
        display: none;
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background-color: #fef3c7;
        color: #333;
        padding: 1rem 2rem;
        border: 2px solid #facc15;
        border-radius: 12px;
        font-weight: 600;
        font-size: 1.2rem;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        z-index: 9999;
        transition: opacity 0.5s ease;
    "></div>
    <div class="container">
        <header>
            <h1>SEZGİN Kuyumculuk</h1>
        </header>
        <h2>Güncel Altın Fiyatları</h2>
        <table id="fiyatTablosu">
            <thead>
                <tr>
                    <th>Tür</th>
                    <th>Alış</th>
                    <th>Satış</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        let sonVeri = null;

        function guncelleTablo(data) {
            delete data.guncellemeZamani;
            const tbody = document.querySelector('#fiyatTablosu tbody');
            tbody.innerHTML = ""; // eski satırları temizle

            Object.entries(data).forEach(([tur, fiyat]) => {
                const satir = document.createElement('tr');

                // Önceki değer varsa farkı hesapla
                let oncekiFiyat = sonVeri ? sonVeri[tur] : null;
                let fark = "";
                let okIsareti = "";
                if (oncekiFiyat && fiyat.satış && oncekiFiyat.satış) {
                    const yeni = parseFloat(fiyat.satış.replace(/[^\d,]/g, '').replace(",", "."));
                    const eski = parseFloat(oncekiFiyat.satış.replace(/[^\d,]/g, '').replace(",", "."));
                    if (!isNaN(yeni) && !isNaN(eski)) {
                        if (yeni > eski) {
                            fark = " <span class='fark-ok green-ok'>↑</span>";
                        } else if (yeni < eski) {
                            fark = " <span class='fark-ok red-ok'>↓</span>";
                        }
                    }
                }

                satir.innerHTML = `
                    <td data-label="Tür">${tur}</td>
                    <td data-label="Alış">${fiyat.alış}</td>
                    <td data-label="Satış">${fiyat.satış}${fark}</td>
                `;
                tbody.appendChild(satir);
            });
        }

        function gosterBildirim(metin) {
            const kutu = document.getElementById("bildirimKutusu");
            kutu.innerHTML = metin;
            kutu.style.display = "block";
            kutu.style.opacity = 1;
            setTimeout(() => {
                kutu.style.opacity = 0;
                setTimeout(() => {
                    kutu.style.display = "none";
                }, 500);
            }, 5000);
        }

        async function veriYukle() {
            try {
                const res = await fetch('fiyatlar.json', { cache: "no-store" });
                const yeniVeri = await res.json();
                guncelleTablo(yeniVeri);
                sonVeri = yeniVeri;
            } catch (err) {
                document.body.innerHTML += "<p>Veri alınamadı.</p>";
                console.error(err);
            }
        }

        async function kontrolEtVeYenile() {
            try {
                const res = await fetch('fiyatlar.json', { cache: "no-store" });
                const yeniVeri = await res.json();
                const veriStr = JSON.stringify(yeniVeri);
                if (sonVeri && veriStr !== JSON.stringify(sonVeri)) {
                    guncelleTablo(yeniVeri);

                    // Bildirimleri oluştur
                    let bildirimler = [];
                    Object.entries(yeniVeri).forEach(([tur, fiyat]) => {
                        const onceki = sonVeri?.[tur];
                        if (onceki && fiyat?.satış && onceki?.satış) {
                            const yeni = parseFloat(fiyat.satış.replace(/[^\d,]/g, '').replace(",", "."));
                            const eski = parseFloat(onceki.satış.replace(/[^\d,]/g, '').replace(",", "."));
                            if (!isNaN(yeni) && !isNaN(eski) && yeni !== eski) {
                                const fark = yeni > eski ? "🔼" : "🔽";
                                bildirimler.push(`${tur} ${eski.toFixed(2)} → ${yeni.toFixed(2)} ${fark}`);
                            }
                        }
                    });

                    if (bildirimler.length > 0) {
                        gosterBildirim("📢 " + bildirimler.join(" | "));
                    }

                    sonVeri = yeniVeri;
                }
            } catch (e) {
                console.error("Veri kontrol edilemedi", e);
            }
        }

        veriYukle(); // Sayfa ilk açıldığında yükle
        setInterval(kontrolEtVeYenile, 10000); // Her 10 saniyede bir kontrol et
    </script>
    </script>
    <div style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;">
        <a href="https://wa.me/905394325678?text=Merhaba,%20alt%C4%B1n%20fiyatlar%C4%B1%20hakk%C4%B1nda%20bilgi%20almak%20istiyorum."
            target="_blank"
            style="display: block; margin-bottom: 10px; background-color: #25D366; color: white; padding: 12px 18px; border-radius: 30px; text-decoration: none; font-weight: bold; font-size: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.2);">
            💬 WhatsApp
        </a>
        <a href="tel:+905394325678"
            style="display: block; background-color: #c89e50; color: white; padding: 12px 18px; border-radius: 30px; text-decoration: none; font-weight: bold; font-size: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.2);">
            📞 Bizi Ara
        </a>
    </div>
    <p id="guncellemeZamani"
        style="text-align:center; margin: 3rem 0 1rem 0; font-size: 1.1rem; color: #555; font-weight: 500;"></p>
</body>

</html>
