<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Altın Fiyatları</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: linear-gradient(to bottom, #fefefe, #f3e9dc);
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 3rem auto;
            background: #fff;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        header h1 {
            font-size: 2.5rem;
            color: #c89e50;
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
            font-weight: 700;
        }

        h2 {
            font-size: 1.5rem;
            text-align: center;
            color: #555;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        th {
            background-color: #fafafa;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 1rem;
            color: #555;
            padding: 14px;
        }

        td {
            background: #fff;
            padding: 16px;
            text-align: center;
            border: 1px solid #eee;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 500;
        }

        tr {
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.03);
        }

        tr:hover td {
            background: #fef6e4;
            transition: background 0.3s ease;
        }

        #guncellemeZamani {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.95rem;
            color: #777;
        }

        @media (max-width: 600px) {

            table,
            thead,
            tbody,
            th,
            td,
            tr {
                display: block;
            }

            tr {
                margin-bottom: 1rem;
            }

            td {
                text-align: right;
                padding-left: 50%;
                position: relative;
            }

            td::before {
                content: attr(data-label);
                position: absolute;
                left: 0;
                width: 50%;
                padding-left: 1rem;
                font-weight: bold;
                text-align: left;
                color: #999;
                font-size: 1rem;
            }

            th {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>SEZGİN Kuyumculuk</h1>
        </header>
        <h2>Güncel Altın Fiyatları</h2>
        <table id="fiyatTablosu">
            <thead>
                <tr>
                    <th>Tür</th>
                    <th>Alış</th>
                    <th>Satış</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <p id="guncellemeZamani"></p>
    </div>

    <script>
        fetch('fiyatlar.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById("guncellemeZamani").textContent =
                    "Son Güncelleme: " + new Date().toLocaleString("tr-TR");

                const tbody = document.querySelector('#fiyatTablosu tbody');
                Object.entries(data).forEach(([tur, fiyat]) => {
                    const satir = document.createElement('tr');
                    satir.innerHTML = `<td data-label="Tür">${tur}</td><td data-label="Alış">${fiyat.alış}</td><td data-label="Satış">${fiyat.satış}</td>`;
                    tbody.appendChild(satir);
                });
            })
            .catch(err => {
                document.body.innerHTML += "<p>Veri alınamadı.</p>";
                console.error(err);
            });
    </script>
</body>

</html>
